name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      IMG: ghcr.io/asmogo/cashu-operator:${{ github.event.release.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/asmogo/cashu-operator:${{ github.event.release.tag_name }}
            ghcr.io/asmogo/cashu-operator:latest

      - name: Build install.yaml
        run: make build-installer IMG=${{ env.IMG }}

      - name: Upload install.yaml to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.yaml
