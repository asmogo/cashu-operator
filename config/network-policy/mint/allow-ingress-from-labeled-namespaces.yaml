# Apply this policy in each namespace where CashuMint workloads run.
# Label ingress/API gateway namespaces with:
#   cashu.asmogo.github.io/allow-mint-ingress=true
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cashumint-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cashu-mint
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
  - from:
    - namespaceSelector:
        matchLabels:
          cashu.asmogo.github.io/allow-mint-ingress: "true"
