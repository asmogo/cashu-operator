# This rule is not used by the project cashu-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over mint.cashu.asmogo.github.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cashu-operator
    app.kubernetes.io/managed-by: kustomize
  name: cashumint-admin-role
rules:
- apiGroups:
  - mint.cashu.asmogo.github.io
  resources:
  - cashumints
  verbs:
  - '*'
- apiGroups:
  - mint.cashu.asmogo.github.io
  resources:
  - cashumints/status
  verbs:
  - get
