# This rule is not used by the project cashu-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the mint.cashu.asmogo.github.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cashu-operator
    app.kubernetes.io/managed-by: kustomize
  name: cashumint-editor-role
rules:
- apiGroups:
  - mint.cashu.asmogo.github.io
  resources:
  - cashumints
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mint.cashu.asmogo.github.io
  resources:
  - cashumints/status
  verbs:
  - get
