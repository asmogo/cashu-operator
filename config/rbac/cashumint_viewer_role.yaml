# This rule is not used by the project cashu-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to mint.cashu.asmogo.github.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cashu-operator
    app.kubernetes.io/managed-by: kustomize
  name: cashumint-viewer-role
rules:
- apiGroups:
  - mint.cashu.asmogo.github.io
  resources:
  - cashumints
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mint.cashu.asmogo.github.io
  resources:
  - cashumints/status
  verbs:
  - get
