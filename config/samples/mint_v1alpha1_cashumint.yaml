# Starter template for a new CashuMint.
# Keep the blocks you need and delete the rest before applying in production.
apiVersion: mint.cashu.asmogo.github.io/v1alpha1
kind: CashuMint
metadata:
  name: cashumint-template
spec:
  mintInfo:
    url: https://mint.example.com
    autoGenerateMnemonic: true
    name: Template Cashu Mint
    description: Copy this sample and customize it for your own mint
  database:
    engine: postgres
    postgres:
      autoProvision: true
      autoProvisionSpec:
        storageSize: 10Gi
        version: "16"
  paymentBackend:
    # Exactly one backend must be set: lnd, cln, lnbits, fakeWallet, or grpcProcessor.
    fakeWallet:
      supportedUnits:
        - sat
  service:
    type: ClusterIP
  logging:
    level: info
    format: json
