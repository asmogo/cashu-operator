apiVersion: mint.cashu.asmogo.github.io/v1alpha1
kind: CashuMint
metadata:
  name: cashumint-production
spec:
  image: cashubtc/mintd:0.15.0
  mintInfo:
    url: https://cashu.example.com
    name: Example Cashu Mint
    description: Production-style Cashu mint using an external gRPC processor
    mnemonicSecretRef:
      name: cashumint-production-secrets
      key: mnemonic
    useKeysetV2: true
    quoteTtl:
      mintTtl: 600
      meltTtl: 120
  database:
    engine: postgres
    postgres:
      autoProvision: true
      autoProvisionSpec:
        storageSize: 100Gi
        storageClassName: fast-ssd
        version: "16"
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
  backup:
    enabled: true
    schedule: "0 */6 * * *"
    retentionCount: 14
    s3:
      bucket: cashu-mint-backups
      prefix: cashumint-production
      region: us-east-1
      accessKeyIdSecretRef:
        name: cashumint-production-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKeySecretRef:
        name: cashumint-production-backup
        key: AWS_SECRET_ACCESS_KEY
  paymentBackend:
    minMint: 100
    maxMint: 1000000
    minMelt: 100
    maxMelt: 1000000
    grpcProcessor:
      address: https://grpc-processor.cashu.svc.cluster.local
      port: 50051
      supportedUnits:
        - sat
      tlsSecretRef:
        name: grpc-client-cert
        key: client.crt
  managementRPC:
    enabled: true
  limits:
    maxInputs: 128
    maxOutputs: 256
  ingress:
    enabled: true
    host: cashu.example.com
    tls:
      enabled: true
      certManager:
        enabled: true
        issuerName: letsencrypt-prod
        issuerKind: ClusterIssuer
  prometheus:
    enabled: true
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  logging:
    level: info
    format: json
