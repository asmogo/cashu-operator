apiVersion: mint.cashu.asmogo.github.io/v1alpha1
kind: CashuMint
metadata:
  name: cdk-spark
  namespace: cashu-mints
spec:
  image: "docker.io/cashubtc/mintd:latest"

  # Mint info
  mintInfo:
    url: "https://spark.ucash.space"
    name: "Spark Lightning Mint"
    description: "Cashu mint with Breez SDK Spark payment processor"
    descriptionLong: "A production-ready Cashu mint using the Spark payment processor for nodeless Lightning operations"
    listenHost: "0.0.0.0"
    listenPort: 8085
    # Mnemonic should be stored in a secret
    mnemonicSecretRef:
      name: cashumint-spark-secrets
      key: mnemonic

  # Database configuration - using auto-provisioned PostgreSQL
  database:
    engine: postgres
    postgres:
      autoProvision: true
      autoProvisionSpec:
        storageSize: "20Gi"
        version: "15"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

  # Payment backend configuration - gRPC processor with Spark
  paymentBackend:
    backend: grpcprocessor
    minMint: 100
    maxMint: 1000000
    minMelt: 100
    maxMelt: 1000000
    grpcProcessor:
      port: 50051
      supportedUnits:
        - sat
      # Enable the generic gRPC sidecar processor
      # address defaults to localhost when sidecarProcessor is enabled
      sidecarProcessor:
        enabled: true
        image: "docker.io/asmogo/cdk-spark-payment-processor:latest"
        imagePullPolicy: IfNotPresent
        workingDir: "/data/spark-processor"
        env:
          - name: SERVER_ADDR
            value: "0.0.0.0"
          - name: SERVER_PORT
            value: "50051"
          - name: WORKING_DIR
            value: "/data/spark-processor"
          # Breez API key from secret (required)
          - name: BREEZ_API_KEY
            valueFrom:
              secretKeyRef:
                name: spark-processor-secrets
                key: breez-api-key
          # BIP-39 mnemonic from secret (required)
          - name: BREEZ_MNEMONIC
            valueFrom:
              secretKeyRef:
                name: spark-processor-secrets
                key: mnemonic
          # Optional: passphrase for mnemonic
          # - name: BREEZ_PASSPHRASE
          #   valueFrom:
          #     secretKeyRef:
          #       name: spark-processor-secrets
          #       key: passphrase
        # Resource requirements for the processor
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Optional: Enable TLS for the gRPC server
        # enableTLS: false
        # tlsSecretRef:
        #   name: spark-tls-secret
        #   key: server.crt

  # Ingress configuration with TLS
  ingress:
    enabled: true
    className: nginx
    host: spark.ucash.space
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    tls:
      enabled: true
      certManager:
        enabled: true
        issuerName: letsencrypt
        issuerKind: ClusterIssuer

  # Service configuration
  service:
    type: ClusterIP

  # Resource requirements for the mint
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Logging configuration
  logging:
    level: info
    format: json

  # Storage for the mint and processor data
  storage:
    size: "10Gi"
    # storageClassName: standard

  # Security contexts
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

---
# Secret for the Spark payment processor
# This should be created before deploying the CashuMint
apiVersion: v1
kind: Secret
metadata:
  name: spark-processor-secrets
  namespace: cashu-mints
type: Opaque
stringData:
  # Replace with your actual Breez API key from https://breez.technology/request-api-key/
  breez-api-key: ""
  # Replace with your BIP-39 mnemonic (12 or 24 words) for the Spark processor
  mnemonic: ""
  # Optional: passphrase for the mnemonic
  # passphrase: ""

---
# Secret for the mint mnemonic
apiVersion: v1
kind: Secret
metadata:
  name: cashumint-spark-secrets
  namespace: cashu-mints
type: Opaque
stringData:
  # Replace with your mint's BIP-39 mnemonic
  mnemonic: ""
