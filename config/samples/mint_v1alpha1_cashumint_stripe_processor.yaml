apiVersion: mint.cashu.asmogo.github.io/v1alpha1
kind: CashuMint
metadata:
  name: cashumint-stripe-processor
spec:
  image: cashubtc/mintd:0.16
  mintInfo:
    url: https://stripe-mint.example.com
    name: "Stripe Cashu Mint"
    description: "Cashu mint using the Stripe gRPC payment processor"
    mnemonicSecretRef:
      name: cashumint-stripe-processor-mnemonic
      key: mnemonic
  database:
    engine: postgres
    postgres:
      autoProvision: true
      autoProvisionSpec:
        storageSize: 20Gi
        version: "16"
  paymentBackend:
    grpcProcessor:
      supportedUnits:
        - usd
      sidecarProcessor:
        enabled: true
        image: asmogo/cdk-stripe-payment-processor:sha-7512cbe
        workingDir: /data/stripe-processor
        env:
          - name: STRIPE_API_KEY
            valueFrom:
              secretKeyRef:
                name: stripe-credentials
                key: STRIPE_API_KEY
          - name: STRIPE_WEBHOOK_SECRET
            valueFrom:
              secretKeyRef:
                name: stripe-credentials
                key: STRIPE_WEBHOOK_SECRET
          - name: SERVER_PORT
            value: "50051"
  ingress:
    enabled: true
    host: stripe-mint.example.com
    tls:
      enabled: true
      certManager:
        enabled: true
        issuerName: letsencrypt
        issuerKind: ClusterIssuer
  service:
    type: ClusterIP
  logging:
    level: info
    format: json
