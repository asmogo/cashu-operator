apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tee-mint-data
  namespace: default
  labels:
    app.kubernetes.io/instance: tee-mint
    app.kubernetes.io/managed-by: cashu-operator
    app.kubernetes.io/name: cashu-mint
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo
---
apiVersion: v1
kind: Service
metadata:
  name: tee-mint
  namespace: default
  labels:
    app.kubernetes.io/instance: tee-mint
    app.kubernetes.io/managed-by: cashu-operator
    app.kubernetes.io/name: cashu-mint
  annotations:
    # Disable container-native NEG: the pod IP is a tunneled peer-pod address the
    # L7 LB cannot reach. The instance-group (NodePort) backend is used instead.
    cloud.google.com/neg: '{"ingress": false}'
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: tee-mint
    app.kubernetes.io/managed-by: cashu-operator
    app.kubernetes.io/name: cashu-mint
  ports:
    - name: api
      port: 8085
      targetPort: api
      protocol: TCP
