apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    deprecated.daemonset.template.generation: '10'
  labels:
    app: cloud-api-adaptor
  name: cloud-api-adaptor-daemonset
  namespace: confidential-containers-system
spec:
  selector:
    matchLabels:
      app: cloud-api-adaptor
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-05-29T10:19:06+02:00'
      labels:
        app: cloud-api-adaptor
    spec:
      containers:
      - command:
        - /usr/local/bin/cloud-api-adaptor
        - gcp
        env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/certs/ca-certificates.crt
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        envFrom:
        - secretRef:
            name: peer-pods-secret
        - configMapRef:
            name: peer-pods-cm
        image: quay.io/confidential-containers/cloud-api-adaptor:v0.21.0-amd64
        imagePullPolicy: Always
        name: cloud-api-adaptor-con
        resources: {}
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - SYS_ADMIN
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /startup
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/ssl/certs
          name: ca-bundle
          readOnly: true
        - mountPath: /root/.ssh/
          name: ssh
          readOnly: true
        - mountPath: /run/peerpod
          name: pods-dir
        - mountPath: /run/netns
          mountPropagation: HostToContainer
          name: netns
        - mountPath: /run/xtables.lock
          name: xtables-lock
        - mountPath: /lib/modules
          name: lib-modules
          readOnly: true
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      nodeSelector:
        node.kubernetes.io/worker: ''
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: cloud-api-adaptor
      serviceAccountName: cloud-api-adaptor
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: ca-bundle
        name: ca-bundle
      - name: ssh
        secret:
          defaultMode: 384
          optional: true
          secretName: ssh-key-secret
      - hostPath:
          path: /run/peerpod
          type: ''
        name: pods-dir
      - hostPath:
          path: /run/netns
          type: ''
        name: netns
      - hostPath:
          path: /run/xtables.lock
          type: FileOrCreate
        name: xtables-lock
      - hostPath:
          path: /lib/modules
          type: ''
        name: lib-modules
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
